<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Водить.РФ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: Arial;
    max-width: 390px;
    margin: 0 auto;
    padding: 20px;
    background: #e8f4f8;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
h1, h2 { color: #0077b6; text-align: center; }
input, select, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}
.btn {
    width: 100%;
    padding: 12px;
    background: #0077b6;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.btn:hover { background: #005f8a; }
.nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}
.nav a { color: #0077b6; text-decoration: none; }
.app-card {
    border: 1px solid #ddd;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 5px;
}
.slider {
    overflow: hidden;
    border-radius: 10px;
    margin: 20px 0;
}
.slides { display: flex; transition: transform 0.5s; }
.slide {
    min-width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
}
.slide:nth-child(1) { background: #0077b6; }
.slide:nth-child(2) { background: #023e8a; }
.slide:nth-child(3) { background: #03045e; }
.slide:nth-child(4) { background: #00b4d8; }
.slider-btn {
    position: absolute;
    top: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <div class="container">
        {% if user.is_authenticated %}
        <div class="nav">
            <span> Привет, {{ user.username }}</span>
            <div>
                <a href="{% url 'dashboard' %}">Кабинет</a>
                <a href="{% url 'create_application' %}">Заявка</a>
                {% if user.username == 'Admin26' %}
                <a href="{% url 'admin_panel' %}">Админ</a>
                {% endif %}
                <a href="{% url 'logout' %}">Выйти</a>
            </div>
        </div>
        {% endif %}

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        if (slides.length > 0) {
            function showSlide(index) {
                if (index >= slides.length) currentSlide = 0;
                if (index < 0) currentSlide = slides.length - 1;
                const offset = -currentSlide * 100;
                document.querySelector('.slides').style.transform = `translateX(${offset}%)`;
            }
            
            function nextSlide() {
                currentSlide++;
                showSlide(currentSlide);
            }
            
            function prevSlide() {
                currentSlide--;
                showSlide(currentSlide);
            }
            
            setInterval(nextSlide, 3000);
            
            document.querySelector('.slider-btn.prev')?.addEventListener('click', prevSlide);
            document.querySelector('.slider-btn.next')?.addEventListener('click', nextSlide);
        }
    </script>
</body>
</html>
