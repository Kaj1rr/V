{% extends 'base.html' %}

{% block content %}
<h1> Новая заявка</h1>

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="{{ form.transport_type.id_for_label }}">Вид транспорта</label>
        {{ form.transport_type }}
    </div>
    
    <div class="form-group">
        <label for="{{ form.start_date.id_for_label }}">Дата начала</label>
        {{ form.start_date }}
    </div>
    
    <div class="form-group">
        <label for="{{ form.payment_method.id_for_label }}">Способ оплаты</label>
        {{ form.payment_method }}
    </div>
    
    <button type="submit" class="btn">Отправить заявку</button>
</form>

<p style="text-align: center; margin-top: 20px;">
    <a href="{% url 'dashboard' %}">Вернуться в кабинет</a>
</p>
{% endblock %}
